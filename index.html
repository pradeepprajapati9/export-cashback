<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Export Cashback — Recover Stuck RoDTEP / IGST / Drawback Refunds</title>
  <meta name="description" content="Free tool + guides for Indian exporters to find and recover stuck or unclaimed RoDTEP, IGST refund and duty drawback cashback." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- minimal custom css: sirf sticky sidebar ke liye -->
  <style>
    @media (min-width:768px){ .sidebar{ position:sticky; top:1rem; } }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold mb-0">Export Cashback <span class="fw-normal opacity-75 fs-6">· Refund Fix</span></span>
      <a class="btn btn-sm btn-light fw-semibold js-wa" data-msg="Hi, I need help with my stuck export refund." target="_blank">💬 WhatsApp</a>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="row g-4">

      <!-- LEFT: menu -->
      <aside class="col-12 col-md-3 col-lg-3">
        <div class="sidebar">
          <div class="list-group shadow-sm">
            <a href="#overview" data-page="overview" class="list-group-item list-group-item-action">🏠 Overview</a>
            <a href="#checker"  data-page="checker"  class="list-group-item list-group-item-action">🧮 Cashback Checker</a>
            <a href="#errors"   data-page="errors"   class="list-group-item list-group-item-action">⚠️ Common Errors</a>
            <a href="#sb005"    data-page="sb005"    class="list-group-item list-group-item-action">🔧 SB005 Fix Guide</a>
            <a href="#help"     data-page="help"     class="list-group-item list-group-item-action">💬 Get Help</a>
          </div>
          <p class="text-muted small mt-3 px-1 mb-0">Not affiliated with any government body.</p>
        </div>
      </aside>

      <!-- RIGHT: content (partials yaha load honge) -->
      <main class="col-12 col-md-9 col-lg-9">
        <div id="content" class="bg-white rounded-3 shadow-sm p-4 p-md-5">
          <div class="text-muted">Loading…</div>
        </div>
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // WhatsApp number (with country code)
    const WA_NUMBER = "919953183126";

    const routes = {
      overview: "partials/overview.html",
      checker:  "partials/checker.html",
      errors:   "partials/errors.html",
      sb005:    "partials/sb005.html",
      help:     "partials/help.html",
    };

    function inr(n){ return "₹" + Math.round(n).toLocaleString("en-IN"); }

    async function load(page){
      if(!routes[page]) page = "overview";
      const el = document.getElementById("content");
      try{
        const r = await fetch(routes[page]);
        el.innerHTML = await r.text();
      }catch(err){
        el.innerHTML = '<div class="alert alert-danger mb-0">Could not load content. '
          + 'Please open this page over <b>http://</b> or <b>https://</b> — '
          + 'browsers block fetch on the file:// protocol.</div>';
      }
      document.querySelectorAll("[data-page]").forEach(a =>
        a.classList.toggle("active", a.dataset.page === page));
      updateWa();
      history.replaceState(null, "", "#" + page);
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    // sabhi static WhatsApp buttons (.js-wa) ka href set karo
    function updateWa(){
      document.querySelectorAll(".js-wa").forEach(a => {
        const msg = a.dataset.msg || "Hi, I need help recovering my stuck export refund.";
        a.href = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(msg);
        a.target = "_blank";
      });
    }

    // Checker ka logic — global, taaki inject hone ke baad form isse call kar sake
    function calc(e){
      e.preventDefault();
      const fob = parseFloat(document.getElementById("fob").value) || 0;
      const rate = parseFloat(document.getElementById("cat").value) || 1.5;
      const declared = document.getElementById("declared").value;
      const igst = document.getElementById("igst").value;
      const err = document.getElementById("err").value;

      const reasons = [];
      const rodtep = fob * (rate/100);
      const igstAmt = igst === "yes" ? fob * 0.18 : 0;
      let potential = 0, stuck = false;

      if (declared === "no"){
        potential += rodtep; stuck = true;
        reasons.push("RoDTEP declaration missing/unsure — approx <b>" + inr(rodtep) +
          "</b> may be unclaimed (a supplementary claim route may still exist).");
      } else if (["sb005","scroll","ebrc","notrecv"].includes(err)){
        potential += rodtep; stuck = true;
      } else {
        reasons.push("Your RoDTEP looks declared and received — likely already credited.");
      }

      if (igstAmt > 0 && ["sb005","ebrc","notrecv"].includes(err)){
        potential += igstAmt; stuck = true;
        reasons.push("IGST refund of approx <b>" + inr(igstAmt) +
          "</b> may be blocked (common with SB005 / e-BRC issues).");
      }

      const errMsg = {
        sb005:"SB005 = invoice mismatch between GST return and Shipping Bill — a known, fixable block.",
        scroll:"Scroll/scrip not generating usually points to a port-code or ledger issue on ICEGATE.",
        ebrc:"e-BRC pending means your bank hasn't confirmed foreign payment to DGFT — cashback stays on hold.",
        notrecv:"Refund not received yet — worth checking if a mismatch is silently holding it.",
        none:""
      };
      if (errMsg[err]) reasons.push(errMsg[err]);

      const waMsg = "Hi, I used the Export Cashback Checker. Estimated stuck/unclaimed: " +
        inr(potential) + " (FOB " + inr(fob) + ", issue: " + err + "). Please help me recover it.";
      const waHref = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(waMsg);

      const head = stuck && potential>0 ? "bg-danger" : "bg-success";
      const title = stuck && potential>0
        ? "Looks like money may be stuck or unclaimed"
        : "Nothing obviously stuck — but a detailed check can still help";

      document.getElementById("result").innerHTML =
        '<div class="card border-0 shadow-sm overflow-hidden">' +
          '<div class="'+head+' text-white p-4">' +
            '<div class="small text-uppercase opacity-75">Estimated cashback waiting for you</div>' +
            '<div class="display-6 fw-bold">'+ inr(potential) +'</div>' +
          '</div>' +
          '<div class="card-body">' +
            '<p class="fw-semibold mb-2">'+ title +'</p>' +
            '<ul class="mb-3">'+ reasons.map(r=>'<li>'+r+'</li>').join("") +'</ul>' +
            '<a href="'+waHref+'" target="_blank" class="btn btn-success w-100 fw-bold">💬 Get help recovering it on WhatsApp</a>' +
          '</div>' +
        '</div>';
      document.getElementById("result").scrollIntoView({behavior:"smooth"});
      return false;
    }

    document.querySelectorAll("[data-page]").forEach(a =>
      a.addEventListener("click", ev => { ev.preventDefault(); load(a.dataset.page); }));

    load((location.hash || "#overview").slice(1));
  </script>
</body>
</html>
